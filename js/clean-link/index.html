<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clean-Link</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="app.js"></script>

</head>

<body>

<div class="container">

<header>

<h1>♻️ Clean-Link</h1>

<p>
우리동네 종량제 봉투 & 환경 데이터 플랫폼
</p>

</header>

<section class="card">

<h2>📍 위치 서비스</h2>

<button id="locationBtn">
내 위치 찾기
</button>

<div id="locationResult">
위치를 확인해주세요.
</div>

</section>

<section class="card">

<h2>📊 판매점 분석</h2>

<canvas id="storeChart"></canvas>

</section>

<section class="stats">

<div class="stat-card">

<h3>판매점 수</h3>

<p>120개</p>

</div>

<div class="stat-card">

<h3>평균 가격</h3>

<p>600원</p>

</div>

<div class="stat-card">

<h3>밀집도</h3>

<p>85점</p>

</div>

</section>

<section class="card">

<h2>🌱 환경 리포트</h2>

<p>
현재 지역은 판매점 접근성이 우수한 지역입니다.
분리배출 참여율 향상이 기대됩니다.
</p>

</section>

</div>

</body>
</html>
