<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리동네 클린-링크</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header><h1>♻️ 우리동네 클린-링크</h1></header>
        
        <section class="card">
            <h2>📍 지역 선택</h2>
            <select id="regionSelect">
                <option value="">지역을 선택하세요</option>
                <option value="강남구">강남구</option>
                <option value="서초구">서초구</option>
                <option value="송파구">송파구</option>
                <option value="성북구">성북구</option>
                <option value="노원구">노원구</option>
            </select>
            <div id="infoResult" style="margin-top:15px; font-weight:bold;">지역을 선택하면 분석 결과가 나타납니다.</div>
        </section>

        <section class="card">
            <h2>📊 지역별 판매점 현황</h2>
            <div style="height: 300px;"><canvas id="storeChart"></canvas></div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
