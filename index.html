<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리동네 클린-링크</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header><h1>♻️ 우리동네 클린-링크</h1></header>
        <section class="card">
            <h2>📍 내 위치 기반 주소</h2>
            <button id="locationBtn">위치 확인하기</button>
            <div id="locationResult" style="margin-top:15px; font-weight:bold;">버튼을 누르고 [허용]을 선택하세요.</div>
        </section>
        <section class="card">
            <h2>📊 지역별 데이터 (클릭 가능)</h2>
            <div style="height:300px;"><canvas id="storeChart"></canvas></div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
